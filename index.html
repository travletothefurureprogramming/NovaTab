<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Tab</title>
    <link rel="stylesheet" href="styles/style.css">

</head>

<body>
    <div class="top">
        <p id="weather">Loading weather…</p>
        <p id="time"></p>
        <p id="date"></p>
    </div>
    <div class="content">
        <div class="to-do">
                <h4>To‑Do</h4>
                <ul id="tasks">

                </ul>
                <button id="add_task">+ Add task</button>
        </div>
        <div class="middle">
            <h1 id="title">NovaTab</h1>
            <div class="search-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="search" placeholder="Search the web…">
            </div>
            <p class="hint"><span>/git</span> GitHub · <span>/ytb</span> YouTube · <span>/r</span> Reddit · <span>/mail</span> Gmail · <span>/chat</span> ChatGPT</p>
        </div>
        <div class="calendar">
            <div class="calendar-header">
                <button id="prevMonth">◀</button>
                <h3 id="monthYear"></h3>
                <button id="nextMonth">▶</button>
            </div>

            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
        <div aria-hidden="true"></div>
    </div>


    <div class="bottom">
        <ul id="linksList"></ul>
        <ul>
            <li><button id="toggleAddBtn" onclick="show_add()">Add link</button></li>
        </ul>
        <div class="links" id="links" hidden>
            <input type="text" id="linkName" placeholder="Name (e.g. GitHub)">
            <input type="text" id="linkUrl" placeholder="URL (e.g github.com)">
            <button id="addLinkBtn">Add Link</button>
        </div>
    </div>
    <script src="scripts/app.js"></script>
</body>
</html>
